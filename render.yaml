services:
  # ── Backend Flask ──────────────────────────────────────────────────────────
  - type: web
    name: calculatrice-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  # ── Frontend React ─────────────────────────────────────────────────────────
  - type: web
    name: calculatrice-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
